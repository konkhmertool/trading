<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trading Information</title>

<link rel="icon" href="images/favi.ico">
<link rel="stylesheet" href="style/style.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/jstokename.js"></script>
<script src="js/app.js"></script>

</head>

<body>

<!-- HEADER -->
<header class="site-header">
<div class="header-inner">
<div class="logo">ជួញដូរ<span> - TRADING</span></div>

<button type="button" class="menu-toggle" id="menuToggle">☰</button>

<nav class="nav-menu" id="mainMenu">
<a href="index.html">ទំព័រដើម</a>
<a href="#">ព័ត៌មានមាស</a>
<a href="#">សំខាន់ៗ</a>
<a href="#">ផ្សេងៗ</a>
</nav>
</div>
</header>

<!-- page-wrap -->
<div class="page-wrap">

<section class="app-card">
    <!-- TABS -->
    <div class="tabs">        
		<a href="index.html" class="tab-btn active" data-tab="trade">TRADE</a>
        <a href="history.html" class="tab-btn" data-tab="history">HISTORY</a>
    </div>

    <!-- TRADE -->
    <div id="trade" class="tab-content active">
        <h3>Add more record below</h3>
		<form id="promptForm">
		<div class="form-group">
			<label>Token Name</label>
			<select id="token" class="form-control"></select>
		</div>
		<div class="form-group">
			<label>Type</label>
			<select id="type" class="form-control">
				<option value="Buy">Buy</option>
				<option value="Sell">Sell</option>
			</select>
		</div>
		<div class="form-group">
			<label>Market Price/តម្លៃទីផ្សារ</label>
			<input type="number" step="any" id="price" class="form-control">
		</div>
		<div class="form-group">
			<label>Amount/ចំនួន</label>
			<input type="number" step="any" id="amount" class="form-control">
		</div>
		<div class="form-group">
			<label>Total/សរុប</label>
			<input type="number" step="any" id="total" class="form-control">
		</div>
		<div class="form-group">
			<label>Date Time/ពេលវេលា</label>
			<input type="date" id="datetime" class="form-control" style="width:100%">
		</div>
		<div class="actions" style="margin-top:10px">			
			<button type="button" class="btn" id="save">
				<span class="btn-text">SAVE</span>
				<span class="btn-loader" style="display:none;"></span>
			</button>
			<span id="dspMsg" class="copied-label">Copied.</span>
		</div>		
		</form>
    </div>

    
</section>
</div>
<!-- FIREBASE (MODULE VERSION) -->
<script type="module" src="js/firebase.js"></script>

</body>
</html>
