	<!-- TABS (SAME AS INDEX) -->
	<div class="tabs">

		<a href="history.html" class="tab-btn active">HISTORY</a>
		<a href="goldprice.html" class="tab-btn">GOLD</a>

	<div id="history" class="tab-panel">

		<div style="font-weight:700;font-family:'Khmer OS Siemreap',Arial;">
			Hold / Balance: <span id="balance">0</span> 
			<span id="balanceApprox" style="margin-left:6px;opacity:.7;"></span>
		</div>
		<div style="font-family:'Khmer OS Siemreap',Arial;">
			តម្លៃមាសបច្ចុប្បន្ន: <span id="goldPrice">0</span>​ 
		</div>

		<div style="font-family:'Khmer OS Siemreap',Arial;">
			ចំណេញ: <span id="profitValue">0</span>
		</div>

		<!-- LINE -->
		<div style="height:1px;background:#f6d246;margin:10px 0;"></div>

		<!-- TABLE -->
		<div style="overflow-x:auto;">
<table style="width:100%;border-collapse:collapse;">

<thead>

<!-- 🔥 KHMER + ENGLISH LABEL -->
<tr>
	<th style="padding:6px;">
		<div>ឈ្មោះ</div>
		<div style="font-size:12px;opacity:.8;">Token</div>
	</th>

	<th style="padding:6px;">
		<div>តម្លៃ</div>
		<div style="font-size:12px;opacity:.8;">Price</div>
	</th>

	<th style="padding:6px;">
		<div>ចំនួន OZ</div>
		<div style="font-size:12px;opacity:.8;">Amount</div>
	</th>

	<th style="padding:6px;">
		<div>សរុប</div>
		<div style="font-size:12px;opacity:.8;">Total</div>
	</th>

	<th style="width:30px;"></th>
</tr>

<!-- 🔥 LINE -->
<tr>
	<td colspan="5" style="height:1px;background:#f6d246;"></td>
</tr>

</thead>

<tbody id="historyTable"></tbody>

<tbody id="historyTable"></tbody>

</table>
</div>

		

		<!-- TOTAL -->
		<div style="text-align:right;font-weight:700;padding-top:10px;">
			Total: <span id="totalValue">0</span>
		</div>

	</div>
