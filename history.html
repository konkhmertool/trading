<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>History</title>

<link rel="icon" href="images/favi.ico">
<link rel="stylesheet" href="style/style.css">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/history.js"></script>
</head>

<body>

<!-- HEADER -->
<header class="site-header">
<div class="header-inner">
<div class="logo">ជួញដូរ<span> - TRADING</span></div>

<button type="button" class="menu-toggle" id="menuToggle">☰</button>

<nav class="nav-menu" id="mainMenu">
<a href="index.html">ទំព័រដើម</a>
<a href="#">ព័ត៌មានមាស</a>
<a href="#">សំខាន់ៗ</a>
<a href="#">ផ្សេងៗ</a>
</nav>
</div>
</header>

<!-- PAGE -->
<div class="page-wrap">

<section class="app-card">

	<!-- TABS (SAME AS INDEX) -->
	<div class="tabs">        
		<a href="index.html" class="tab-btn">TRADE</a>
		<a href="history.html" class="tab-btn active">HISTORY</a>
	</div>

	<!-- HISTORY PANEL -->
	<div id="history" class="tab-panel">		

		<!-- BALANCE -->
		<div style="font-weight:700;margin-top:10px;">
			Balance: <span id="balance">0</span>
		</div>

		<!-- LINE -->
		<div style="height:1px;background:#f6d246;margin:10px 0;"></div>

		<!-- TABLE -->
		<div style="overflow-x:auto;">
<table style="width:100%;border-collapse:collapse;">

<thead>
<tr>
	<th style="padding:6px;cursor:pointer;" data-sort="token">
		Token <span class="sort-icon"></span>
	</th>

	<th style="padding:6px;cursor:pointer;" data-sort="date">
		Datetime <span class="sort-icon"></span>
	</th>

	<th style="padding:6px;">Price</th>
	<th style="padding:6px;">Amount</th>
	<th style="padding:6px;">Total</th>
	<th style="padding:6px;"></th>
</tr>

<!-- 🔥 LINE UNDER HEADER -->
<tr>
	<td colspan="6" style="height:1px;background:#f6d246;"></td>
</tr>

</thead>

<tbody id="historyTable"></tbody>

</table>
</div>

		<!-- LINE -->
		<div style="height:1px;background:#f6d246;margin:10px 0;"></div>

		<!-- TOTAL -->
		<div style="text-align:right;font-weight:700;">
			Total: <span id="totalValue">0</span>
		</div>

	</div>

</section>
</div>

<!-- FIREBASE (MODULE VERSION) -->
<script type="module" src="js/firebase.js"></script>

</body>
</html>
